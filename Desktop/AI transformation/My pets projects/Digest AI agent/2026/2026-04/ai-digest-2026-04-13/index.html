r\/>Уверен, это хорошее обновление для миграции из Plus в Pro. Главный недостаток \u2014 полная непрозрачность. В Клоде все приложения работают по единым и четким правилам, а у ОпенАИ нет."},{"id":"4658","channel":"tips_ai","date":"2026-04-13T12:25:19+00:00","views":"1.32K","reactions":"21","text":"Постоянно пробую новые инструменты и интересно видеть как люди решают одну и ту же задачу по-разному:<br\/><br\/>Например есть <a href=\"https:\/\/github.com\/collaborator-ai\/collab-public\">Collaborator<\/a> \u2014 это бесконечный канвас для работы с AI-агентами.<br\/><br\/>Терминалы, код, заметки, картинки, удобно запускать CC и Codex рядом с файлами которые он редактирует и смотреть параллельно ютуб \ud83d\ude00<br\/><br\/>Установка простая, есть на Windows, macOS и Linux.<br\/><br\/><a href=\"https:\/\/t.me\/tips_ai\">@tips_ai<\/a> #tools","mediaUrl":"https:\/\/cdn4.telesco.pe\/file\/vEx1eaRRMJPtCCLY0Gbx2jWzj0LGyacxGGxs3mzu6ZSfiP-uY3zflIRrkNe0JQ8vEIBqEbYk-tGbJBpFSmZ95mzUvRFvRlgs2yoDucCK_tHzTOreKQo6U0fySaIPcbBzrfHtGzrtRe_fOX7XS-SonoBNFeSKRbC2kjCtwOWXaMoUkUOvg83xPJQ38nSJlsF1IDWGd0LqxY22T5VphJUMfCzi2M44lou4zWoluTy_wgrpfO9XtY4o7PdthqAa0dMB2GX42b9xWTx-XdRYFk_SajhJNCMOYIgLpuw0O5cIWSMnJP1RR-tz9wuFq-7fuLE2PHYRa8wZMIiXnvuz02pz8Q"},{"id":"511","channel":"gleb_pro_ai","date":"2026-04-13T08:50:14+00:00","views":"1.78K","reactions":"17","fwd_from":"Глеб Кудрявцев \u2014 продукты и бизнес","text":"До недавнего времени внедрять AI-агентов в малом и среднем бизнесе мешали три вещи: дорого, долго, не хватает специалистов.<br\/><br\/><a href=\"https:\/\/just-ai.com\/cloud-agent-platform\">Just AI Agent Platform Cloud<\/a> снимает эти барьеры \ud83e\uddbe<br\/><br\/>Это решение для быстрого создания и запуска AI-агентов и мультиагентных систем без необходимости разворачивать собственную инфраструктуру.<br\/><br\/>\ud83d\udd35 Готовое рабочее пространство с drag-and-drop конструктором;<br\/>\ud83d\udd35 Готовые коннекторы к CRM, телефонии, CMS;<br\/>\ud83d\udd35 Оркестрация десятков аге     var COLORS = ["#2AABEE","#E14E54","#9B59B6","#3498DB","#E67E22","#1ABC9C","#E74C3C","#2ECC71","#F39C12","#8E44AD"];

    function getColor(ch) {
      var h = 0;
      for (var i = 0; i < ch.length; i++) h = ch.charCodeAt(i) + ((h << 5) - h);
      return COLORS[Math.abs(h) % COLORS.length];
    }

    function timeAgo(d) {
      var diff = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
      if (diff < 3600) return Math.floor(diff / 60) + "\u043c";
      if (diff < 86400) return Math.floor(diff / 3600) + "\u0447";
      return Math.floor(diff / 86400) + "\u0434";
    }

    var activeChannel = "all";

    function render() {
      var posts = DATA.posts.filter(function(p) {
        return activeChannel === "all" || p.channel === activeChannel;
      }).sort(function(a, b) {
        return new Date(b.date) - new Date(a.date);
      });

      var channels = [];
      var seen = {};
      DATA.posts.forEach(function(p) {
        if (!seen[p.channel]) { seen[p.channel] = true; channels.push(p.channel); }
      });

      var fh = '<button class="' + (activeChannel === "all" ? "active" : "") + '" onclick="setChannel(\'all\')">\u0412\u0441\u0435</button>';
      channels.forEach(function(ch) {
        var cls = activeChannel === ch ? "active" : "";
        var st = activeChannel === ch ? ' style="background:' + getColor(ch) + ';color:#fff;font-weight:600"' : '';
        fh += '<button class="' + cls + '"' + st + ' onclick="setChannel(\'' + ch + '\')">@' + ch + '</button>';
      });
      document.getElementById("filters").innerHTML = fh;

      if (posts.length === 0) {
        document.getElementById("feed").innerHTML = '<div class="empty">\u041d\u0435\u0442 \u043f\u043e\u0441\u0442\u043e\u0432</div>';
        return;
      }

      var html = "";
      posts.forEach(function(p) {
        var color = getColor(p.channel);
        html += '<div class="post">';
        html += '<div class="post-header">';
        html += '<span class="avatar" style="background:' + color + '">' + p.channel[0].toUpperCase() + '</span>';
        html += '<span class="channel-name">@' + p.channel + '</span>';
        html += '<span class="time">' + timeAgo(p.date) + '</span>';
        html += '</div>';
        if (p.fwd_from) html += '<div class="fwd">\u21a9 ' + p.fwd_from + '</div>';
        if (p.mediaUrl) html += '<div class="post-media"><img src="' + p.mediaUrl + '" alt="" onerror="this.style.display=\'none\'"></div>';
        html += '<div class="post-text">' + p.text + '</div>';
        html += '<div class="post-footer">';
        if (p.views) html += '<span>\ud83d\udc41 ' + p.views + '</span>';
        if (p.reactions) html += '<span>\u2764\ufe0f ' + p.reactions + '</span>';
        html += '<a href="https://t.me/' + p.channel + '/' + p.id + '" target="_blank">\u041e\u0442\u043a\u0440\u044b\u0442\u044c \u2192</a>';
        html += '</div></div>';
      });
      document.getElementById("feed").innerHTML = html;
    }

    function setChannel(ch) {
      activeChannel = ch;
      render();
    }

    render();
  </script>
